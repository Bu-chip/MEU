name: Discover tags (Bandcamp)

# Descubrimiento programado de discos por tags de Euskal Herria (ver
# scripts/discover_tags.py y docs/scraping-method.md).
#
# PRINCIPIO INNEGOCIABLE: el robot propone, Miguel dispone. Este
# workflow JAMÁS toca main ni el canónico: el estado vive en la rama
# discovery-state y los candidatos entran solo vía PR revisable desde
# ramas candidates/YYYY-MM. Sin novedades tras el dedupe → sin PR.
#
# Si el run falla con "El scraper terminó con código 2", discover_web o
# las fichas ya no cumplen el contrato verificado: ejecutar el canario
# (workflow probe-tag-pages) y revisar docs/scraping-method.md.

on:
  schedule:
    # Día 3 de cada mes a las 04:17 UTC (hora valle, minuto no redondo
    # para esquivar los picos de carga de los cron de GitHub).
    - cron: "17 4 3 * *"
  workflow_dispatch:
    inputs:
      budget:
        description: "Presupuesto de requests de la pasada"
        required: false
        default: "900"
      tags:
        description: "Override: solo estos tags (separados por comas). Vacío = lista cerrada de data/tag_candidates.json"
        required: false
        default: ""
      month:
        description: "Sufijo YYYY-MM del fichero de candidatos (vacío = mes actual)"
        required: false
        default: ""
      dry_run:
        description: "Solo scrape + artifact: no persiste estado ni abre PR"
        type: boolean
        required: false
        default: false

# contents: write para las ramas discovery-state y candidates/*;
# pull-requests: write para abrir el PR de candidatos. Main no se toca.
permissions:
  contents: write
  pull-requests: write

# Mismo group que scrape-covers: jamás dos scrapes a la vez contra Bandcamp.
concurrency:
  group: scrape-covers
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    # 900 requests x ~2,2s ≈ 33 min; margen holgado.
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # El estado (cursors por tag, fichas pendientes) y los candidatos
      # acumulados de runs anteriores viven en la rama discovery-state:
      # así el run mensual grande puede pausar por presupuesto y retomar.
      - name: Restaurar estado y candidatos (rama discovery-state)
        run: |
          if git fetch origin discovery-state; then
            git ls-tree -r --name-only FETCH_HEAD -- data/ \
              | grep -E '^data/(discovery_state\.json|candidates_[^/]+\.json)$' \
              | while read -r f; do
                  git checkout FETCH_HEAD -- "$f"
                  echo "restaurado $f"
                done
          else
            echo "sin rama de estado previa (primera pasada)"
          fi

      - name: Descubrimiento
        id: scrape
        run: |
          BUDGET="${{ inputs.budget || '900' }}"
          TAGS="${{ inputs.tags }}"
          MONTH="${{ inputs.month }}"
          # El código de salida se propaga en el último step: antes hay
          # que persistir el estado aunque el scraper haya fallado.
          set +e
          python3 scripts/discover_tags.py --budget "$BUDGET" \
            --tags "$TAGS" ${MONTH:+--month "$MONTH"}
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "month=${MONTH:-$(date -u +%Y-%m)}" >> "$GITHUB_OUTPUT"

      # if: always() para conservar el progreso parcial ante timeout/cancel.
      - name: Subir artifact con candidatos y estado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-output
          path: |
            data/candidates_*.json
            data/discovery_state.json
          if-no-files-found: warn

      - name: Persistir estado a la rama discovery-state
        if: ${{ !inputs.dry_run }}
        run: |
          cp data/discovery_state.json /tmp/state.json 2>/dev/null || true
          mkdir -p /tmp/cands
          cp data/candidates_*.json /tmp/cands/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git fetch origin discovery-state; then
            git checkout -f -B discovery-state FETCH_HEAD
          else
            git checkout -f -B discovery-state
          fi
          mkdir -p data
          cp /tmp/state.json data/discovery_state.json 2>/dev/null || true
          cp /tmp/cands/*.json data/ 2>/dev/null || true
          # -f: están en .gitignore para proteger main; aquí es deliberado.
          git add -f data/discovery_state.json data/candidates_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "sin cambios de estado"
          else
            git commit -m "estado: run ${{ github.run_id }}"
            git push origin discovery-state
          fi

      - name: Abrir/actualizar PR de candidatos
        if: ${{ !inputs.dry_run && steps.scrape.outputs.rc == '0' }}
        run: |
          MONTH="${{ steps.scrape.outputs.month }}"
          FILE="data/candidates_${MONTH}.json"
          if [ ! -f "$FILE" ]; then
            echo "sin fichero de candidatos → sin PR"
            exit 0
          fi
          TOTAL=$(python3 -c "import json; d = json.load(open('$FILE')); print(len(d['candidates']) + len(d['deferred_oleada2']))")
          if [ "$TOTAL" -eq 0 ]; then
            echo "0 candidatos → sin PR"
            exit 0
          fi
          PENDING=$(python3 -c "import json, pathlib; p = pathlib.Path('data/discovery_state.json'); print(len(json.loads(p.read_text()).get('pending_fichas', {})) if p.exists() else 0)")
          {
            echo "PR generado automáticamente por el workflow \`discover-tags\` (run ${{ github.run_id }})."
            echo
            echo "**Revisión**: elimina del JSON las filas que no deban entrar y apunta su URL normalizada en \`data/rejected.json\` (convención en el meta del propio fichero) para que no se vuelvan a proponer. Los \`id\` definitivos se asignan al merge al canónico. Fichas pendientes para próximas pasadas: ${PENDING}."
            echo
            python3 scripts/discover_tags.py --table "$FILE"
          } > /tmp/pr-body.md
          cp "$FILE" /tmp/cands.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BR="candidates/${MONTH}"
          if git fetch origin "$BR"; then
            git checkout -f -B "$BR" FETCH_HEAD
          else
            git fetch origin main
            git checkout -f -B "$BR" origin/main
          fi
          mkdir -p data
          cp /tmp/cands.json "$FILE"
          git add -f "$FILE"
          PUSHED=0
          if git diff --cached --quiet; then
            echo "candidatos sin cambios respecto a la rama $BR"
          else
            git commit -m "data: candidatos ${MONTH} (run ${{ github.run_id }})"
            git push origin "$BR"
            PUSHED=1
          fi
          OPEN=$(gh pr list --head "$BR" --state open --json number --jq '.[].number' | head -1)
          if [ "$PUSHED" = "1" ]; then
            if [ -z "$OPEN" ]; then
              # Requiere "Allow GitHub Actions to create and approve pull
              # requests" (Settings → Actions → General). Si está apagado,
              # los candidatos quedan a salvo en la rama y el run avisa
              # con el enlace en lugar de fallar.
              if gh pr create --head "$BR" --base main \
                   --title "Candidatos ${MONTH}: ${TOTAL} discos para revisión" \
                   --body-file /tmp/pr-body.md; then
                echo "PR de candidatos abierto"
              else
                echo "::warning::No se pudo abrir el PR automáticamente. Activa 'Allow GitHub Actions to create and approve pull requests' en Settings → Actions → General. Los candidatos están en la rama ${BR}: https://github.com/${{ github.repository }}/compare/main...${BR}"
              fi
            else
              gh pr edit "$OPEN" --body-file /tmp/pr-body.md
              echo "PR #${OPEN} existente actualizado"
            fi
          else
            echo "sin novedades → sin PR"
          fi

      - name: Propagar fallo del scraper
        if: ${{ steps.scrape.outputs.rc != '0' }}
        run: |
          echo "::error::El scraper terminó con código ${{ steps.scrape.outputs.rc }}. Si es 2, discover_web o las fichas ya no cumplen el contrato verificado: ejecutar el canario (workflow probe-tag-pages) y revisar docs/scraping-method.md."
          exit 1
