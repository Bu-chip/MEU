# Deploy post-cutover (F5):
#   raíz de gh-pages = build de Vite de app/ (base '/'), servido en el
#                      dominio custom mapa.queimadacircuitrecords.com.
# El sitio vanilla salió del deploy en el cutover: su fuente (index.html,
# assets/, …) sigue intacta en main y es reversible (ver paso Assemble site).
# GitHub Pages apunta a la rama gh-pages; el CNAME se regenera en cada deploy.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Assemble site (app de Vite en la raíz)
        run: |
          set -euo pipefail
          rm -rf publish
          mkdir publish
          # Cutover F5: el build de la app (base '/') ES el sitio y va a la
          # raíz de publish/. El JSON canónico viaja dentro del build,
          # hasheado en dist/assets (import ?url en useArchive.js), así que
          # no hace falta copiar data/ aparte.
          rsync -a app/dist/ publish/
          # El sitio vanilla ya NO se copia al deploy. Su fuente (index.html,
          # assets/css, assets/js, data/, …) sigue intacta en main; esto es
          # reversible restaurando el rsync del espejo raíz + build en /v2/.
          touch publish/.nojekyll
          # Dominio custom: el paso de publicación hace `git init` + push
          # --force de un árbol nuevo en cada deploy, así que borraría el
          # CNAME que la UI de Pages escribe en la rama gh-pages. Lo
          # regeneramos aquí (después de los rsync, para que nada lo pise)
          # y así el dominio sobrevive a cada deploy.
          echo "mapa.queimadacircuitrecords.com" > publish/CNAME

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd publish
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          git push -q --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
