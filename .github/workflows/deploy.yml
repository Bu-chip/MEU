# Deploy híbrido de convivencia (F1–F4, opción A de la Fase 0):
#   raíz de gh-pages  = copia fiel del sitio vanilla tal cual está en main
#   /v2/              = build de Vite de app/ (base /MEU/v2/)
# GitHub Pages debe apuntar a la rama gh-pages (cambio único de settings).
# El sitio vanilla sigue byte-idéntico en bu-chip.github.io/MEU/ hasta el
# cutover de F5, que moverá el build a la raíz.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Assemble site (vanilla en raíz + app en /v2/)
        run: |
          set -euo pipefail
          rm -rf publish
          mkdir publish
          # Espejo fiel del sitio vanilla: todo main menos el código de la
          # app, el CI y el propio directorio de publicación. Así ninguna
          # URL servida hoy (index, assets/, data/, design/, …) se rompe.
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'app' \
            --exclude 'publish' \
            ./ publish/
          mkdir -p publish/v2
          rsync -a app/dist/ publish/v2/
          touch publish/.nojekyll

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd publish
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          git push -q --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
