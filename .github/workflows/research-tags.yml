name: Research tags (Bandcamp)

# Investigación de tags territoriales de Euskal Herria para el scraper
# de descubrimiento: mide result_count/solape/locations de cada tag de
# la semilla vía discover_web y cosecha tags nuevos desde unas pocas
# fichas. SOLO LECTURA sobre el repo; presupuesto duro de 200 requests
# a 1 req/2s (~8 min). Resultado: artifact + tabla y JSONL en los logs.

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Mini-pasada: medir solo estos tags (separados por comas). Vacío = pasada completa (semilla + cosecha, ~200 requests)."
        required: false
        default: ""
  # La integración de la sesión de Claude no puede lanzar
  # workflow_dispatch (403 actions:write); el push del script en la
  # rama de trabajo hace de disparador, acotado por branches+paths.
  # Los pushes ejecutan la MINI-PASADA de los tags cosechados sin medir
  # (decisión 3 del 2026-07-12), no la pasada completa de 200 requests.
  push:
    branches: [claude/euskadi-catalog-expansion-choh0j]
    paths:
      - scripts/research_tags.py
      - .github/workflows/research-tags.yml

env:
  # Los 24 de meta.sin_medir de data/tag_candidates.json
  # (donostia-san-sebastián exento: duplicado por acentos del ya medido).
  MINIPASS_TAGS: >-
    euskaldun,ezkerraldea,freeimprobilbao,freejazz-bilbao,freejazz-euskadi,
    getaria,getxo-bilbao-gringo-rock,guernica,hardcore-bilbao,
    improvisacion-libre-bilbao,improvisacionbilbao,musica-garage-bilbao,
    ortuella,punk-rock-bilbao,rock-garage-bilbao,surf-bilbao,vasco,zalla,
    basque-ambient,basque-country-rock-&-roll,basquemusic,euskal-rap,
    euskalmusika,orereta

permissions:
  contents: read

# Mismo group que scrape-covers: jamás dos scrapes a la vez contra Bandcamp.
concurrency:
  group: scrape-covers
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    # 200 requests x ~2,2s ≈ 8 min; margen holgado.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Prioridad: input del dispatch > mini-pasada por defecto en push.
      # Un dispatch manual con tags vacío ejecuta la pasada completa.
      - name: Investigación (≤200 requests, 1 req/2s)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="$(echo "$MINIPASS_TAGS" | tr -d ' ')"
          else
            TAGS="${{ inputs.tags }}"
          fi
          python3 scripts/research_tags.py --tags "$TAGS"

      # if: always() para conservar el resultado parcial si algo falla.
      - name: Subir artifact con el resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tag-candidates
          path: probe_out/
          if-no-files-found: warn
